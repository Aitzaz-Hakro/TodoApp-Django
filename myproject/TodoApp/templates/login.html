{% extends "base.html" %}

{% block title %}Sign in · Taskflow{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="card auth-card">
        <div class="auth-brand">
            <div class="brand-mark" style="margin: 0 auto 1rem;">T</div>
            <h1>Welcome back</h1>
            <p>Sign in to manage your tasks.</p>
        </div>

        <form class="auth-form" action="" method="post">
            {% csrf_token %}
            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" class="input" name="username" placeholder="Enter your username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" class="input" name="password" placeholder="Enter your password" required>
            </div>

            {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}

            <button type="submit" class="btn btn-primary">Sign in</button>
        </form>

        <p class="auth-footer">
            Don't have an account?
            <a href="{% url 'signup' %}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
